services:
  prediction-service:
    build:
      context: ./services/prediction-service
    container_name: connectivity-prediction-service
    env_file:
      - ./services/data-service/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8003:8003"
    environment:
      - MAX_RAM_MB=1024
      - APP_CACHE_DIR=/app/shared-cache
    volumes:
      - ./services/prediction-service/models:/app/models
      - ./cache:/app/shared-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=5).status == 200 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  data-service:
    build:
      context: ./services/data-service
    container_name: connectivity-data-service
    env_file:
      - ./services/data-service/.env
    depends_on:
      - prediction-service
    environment:
      - SUPPORTED_CITIES=bangalore
      - DEFAULT_CITY=bangalore
      - PREDICTION_SERVICE_URL=http://prediction-service:8003
      - APP_CACHE_DIR=/app/shared-cache
      - GRAPH_CACHE_DIR=/app/shared-cache/graphs
      - HOTSPOT_CACHE_PATH=/app/shared-cache/hotspots.json
      - HEATMAP_VIEWPORT_ONLY=1
      - ROUTING_MODES=fastest,balanced,connected
      - MAX_RAM_MB=1536
    ports:
      - "8001:8001"
    volumes:
      - ./cache:/app/shared-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).status == 200 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  routing-engine:
    build:
      context: ./services/routing-engine
    container_name: connectivity-routing-engine
    env_file:
      - ./services/data-service/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - data-service
    environment:
      - SUPPORTED_CITIES=bangalore
      - DEFAULT_CITY=bangalore
      - DATA_SERVICE_URL=http://data-service:8001
      - APP_CACHE_DIR=/app/shared-cache
      - GRAPH_CACHE_DIR=/app/shared-cache/graphs
      - ROUTE_CACHE_PATH=/app/shared-cache/route_cache.json
      - HEATMAP_VIEWPORT_ONLY=1
      - ROUTING_MODES=fastest,balanced,connected
      - MAX_RAM_MB=2048
    ports:
      - "8002:8002"
    volumes:
      - ./services/routing-engine/data:/app/data
      - ./cache:/app/shared-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5).status == 200 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  visualization:
    build:
      context: ./services/visualization
    container_name: connectivity-visualization
    depends_on:
      - data-service
      - routing-engine
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    image: nginx:1.27-alpine
    container_name: connectivity-gateway
    depends_on:
      - prediction-service
      - data-service
      - routing-engine
      - visualization
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
